<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ Build-a-City: Adult Learning Styles</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --yellow:#FFD93D;--coral:#FF6B6B;--teal:#4ECDC4;--purple:#A29BFE;
  --green:#6BCB77;--blue:#5B8FF9;--orange:#FDCB6E;--pink:#FF8FB1;
  --sky1:#C8ECFF;--sky2:#E8F7FF;--ground:#7EC850;
  --bg:#FFF8EC;--card:#FFFFFF;--text:#2D3436;--muted:#636E72;
  --shadow:0 4px 20px rgba(0,0,0,0.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.fredoka{font-family:'Fredoka One',cursive;letter-spacing:0.01em}
button{font-family:'Nunito',sans-serif}

/* ── WELCOME ── */
#screen-welcome{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:linear-gradient(180deg,#5DADE2 0%,#85C1E9 25%,#D6EAF8 55%,#FEF9E7 80%);
  text-align:center;padding:0;overflow:hidden;position:relative
}
.welcome-sun{position:absolute;top:22px;right:55px;width:78px;height:78px;
  background:radial-gradient(circle,#FFE066 40%,#F9CA24 100%);border-radius:50%;
  box-shadow:0 0 0 18px rgba(255,217,61,0.16),0 0 0 38px rgba(255,217,61,0.07)}
.wcloud{position:absolute;background:#fff;border-radius:50px;opacity:0.88}
.wcloud::before,.wcloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
.wc1{width:110px;height:36px;top:55px;left:44px}.wc1::before{width:54px;height:54px;top:-26px;left:12px}.wc1::after{width:42px;height:42px;top:-18px;left:50px}
.wc2{width:85px;height:28px;top:95px;right:150px}.wc2::before{width:42px;height:42px;top:-20px;left:8px}.wc2::after{width:33px;height:33px;top:-14px;left:38px}
.welcome-inner{position:relative;z-index:2;padding:0 1.5rem 3rem;display:flex;flex-direction:column;align-items:center;gap:.7rem}
.game-badge{background:var(--yellow);color:#7A5500;font-size:12px;font-weight:900;padding:6px 20px;border-radius:99px;letter-spacing:.06em;text-transform:uppercase}
.welcome-title{font-size:clamp(2.4rem,7vw,3.8rem);color:#1A3D5C;line-height:1.05;margin:.1rem 0}
.welcome-sub{font-size:1.05rem;color:#2E6A8C;max-width:440px;line-height:1.6;font-weight:600}
.feature-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:.3rem}
.feat{background:rgba(255,255,255,.72);backdrop-filter:blur(6px);border:1.5px solid rgba(255,255,255,.9);border-radius:99px;padding:7px 16px;font-size:12px;font-weight:800;color:#1A3D5C}
.btn-start{margin-top:.8rem;padding:16px 50px;font-size:1.3rem;font-family:'Fredoka One',cursive;background:linear-gradient(135deg,#E74C3C,#FF6B6B);color:#fff;border:none;border-radius:99px;cursor:pointer;box-shadow:0 7px 26px rgba(231,76,60,.42);transition:transform .18s,box-shadow .18s}
.btn-start:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 12px 34px rgba(231,76,60,.5)}

/* ── CITY ── */
#screen-city{min-height:100vh;display:flex;flex-direction:column}
.city-header{background:linear-gradient(90deg,#2C3E50,#4A6FA5);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.city-canvas-wrap{background:linear-gradient(180deg,#5DADE2 0%,#85C1E9 32%,#D6EAF8 66%,#7EC850 66%,#5AAA30 100%);flex-shrink:0}
.city-bottom{flex:1;background:#fff;border-top:3px solid var(--yellow);padding:16px 18px;overflow-y:auto}
.mission-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px}
.m-card{background:var(--bg);border:2px solid transparent;border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.m-card.avail{border-color:var(--yellow);background:#FFFBF0}
.m-card.avail:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.10)}
.m-card.done{border-color:var(--green);background:#F0FFF4;cursor:default}
.m-card.done:hover{transform:none}
.m-icon{font-size:1.7rem;margin-bottom:4px}
.m-name{font-size:12px;font-weight:800}
.m-status{font-size:11px;color:var(--muted);margin-top:2px}
.m-check{position:absolute;top:6px;right:7px;width:19px;height:19px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:900}
.score-chips{display:flex;gap:8px;flex-wrap:wrap}
.schip{background:rgba(255,255,255,.18);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:99px;border:1.5px solid rgba(255,255,255,.3)}
/* style tracker */
.style-tracker{margin-top:14px;background:linear-gradient(135deg,#F8F4FF,#F0FFFD);border-radius:16px;padding:14px 16px;border:2px solid #E8DFFF}
.style-tracker h4{font-size:12px;font-weight:900;color:#5C4A8A;margin-bottom:10px;text-transform:uppercase;letter-spacing:.07em}
.sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sbar-lbl{font-size:12px;font-weight:700;width:78px;flex-shrink:0}
.sbar-track{flex:1;height:10px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.sbar-n{font-size:12px;font-weight:800;color:var(--muted);width:18px;text-align:right}

/* ── MISSION MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:#fff;width:100%;max-width:700px;border-radius:24px 24px 0 0;padding:22px 20px 32px;max-height:92vh;overflow-y:auto;animation:slideUp .35s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:5px;background:#E0E0E0;border-radius:99px;margin:0 auto 16px}
.modal-hdr{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.modal-big-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;flex-shrink:0}
.modal-mission-title{font-size:1.45rem}
.modal-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.paths-label{font-size:12px;font-weight:900;color:#636E72;text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px}
.path-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.path-btn{border-radius:18px;padding:14px 12px;border:2px solid transparent;cursor:pointer;text-align:left;transition:all .18s}
.path-btn:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.12)}
.pb-icon{font-size:1.8rem;margin-bottom:6px;display:block}
.pb-name{font-family:'Fredoka One',cursive;font-size:1.05rem;display:block;margin-bottom:2px}
.pb-desc{font-size:11px;opacity:.82;line-height:1.4}
.pb-V{background:#F3F0FF;border-color:#C7BDFF;color:#5C3DBB}
.pb-A{background:#FFF9ED;border-color:#FFE4A0;color:#8A6000}
.pb-K{background:#F0FFF4;border-color:#A8E6B0;color:#1B6B30}
.pb-R{background:#FFF5F5;border-color:#FFBFBF;color:#A82020}
.btn-close-modal{display:block;margin:18px auto 0;background:none;border:2px solid #E0E0E0;color:var(--muted);font-size:13px;font-weight:700;padding:9px 30px;border-radius:99px;cursor:pointer;transition:all .15s}
.btn-close-modal:hover{background:#F5F5F5}

/* ── ACTIVITY SCREEN ── */
#screen-activity{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.act-header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:2px solid rgba(0,0,0,.06);background:#fff;flex-wrap:wrap}
.path-badge{font-size:11px;font-weight:900;padding:5px 13px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
.act-title{font-size:1.15rem;color:var(--text)}
.act-body{flex:1;padding:16px 18px;overflow-y:auto}
.act-content{border-radius:18px;padding:18px;border:2px solid rgba(0,0,0,.05);margin-bottom:18px}
.act-phase-label{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;opacity:.7}

/* Visual activity */
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.zone-card{border-radius:14px;padding:14px 12px;cursor:pointer;transition:all .2s;border:3px solid transparent}
.zone-card:hover{transform:scale(1.03)}
.zone-card.selected{border-color:#2D3436;box-shadow:0 0 0 3px rgba(45,52,54,.25)}
.zone-card.correct{border-color:#27AE60!important;background:#D5F5E3!important}
.zone-card.wrong{border-color:#E74C3C!important;background:#FDEDEC!important;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.zc-icon{font-size:1.6rem;margin-bottom:5px}
.zc-name{font-weight:800;font-size:13px;display:block;margin-bottom:3px}
.zc-desc{font-size:11px;opacity:.8;line-height:1.4}
.vis-stat-row{display:flex;justify-content:space-around;margin-top:12px;flex-wrap:wrap;gap:8px}
.vis-stat{text-align:center;padding:9px 14px;border-radius:12px;background:rgba(255,255,255,.7)}
.vs-num{font-family:'Fredoka One',cursive;font-size:1.4rem;display:block}
.vs-lbl{font-size:10px;color:var(--muted)}

/* Audio player */
.podcast-wrap{background:#1C2340;border-radius:18px;overflow:hidden;margin-bottom:14px}
.pod-topbar{background:linear-gradient(90deg,#2C3E6A,#1C2340);padding:14px 16px;display:flex;align-items:center;gap:12px}
.pod-art{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.pod-meta{flex:1}.pod-show{color:#8BA0C8;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.pod-ep{color:#fff;font-size:14px;font-weight:800;margin-top:2px}
.pod-controls{padding:12px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid rgba(255,255,255,.07)}
.btn-play{width:44px;height:44px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-play:hover{transform:scale(1.08)}
.pod-progress-wrap{flex:1}
.pod-progress-bar{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-bottom:5px}
.pod-progress-fill{height:100%;border-radius:99px;width:0%;transition:width .4s linear}
.pod-time{font-size:11px;color:rgba(255,255,255,.5);display:flex;justify-content:space-between}
.btn-stop{background:none;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:99px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.btn-stop:hover{border-color:rgba(255,255,255,.5);color:#fff}
.transcript-area{padding:14px 16px;max-height:220px;overflow-y:auto}
.transcript-line{display:flex;gap:10px;padding:8px 10px;border-radius:12px;margin-bottom:6px;transition:background .3s;opacity:.55;font-size:13px}
.transcript-line.active{background:rgba(255,255,255,.1);opacity:1}
.tl-speaker{font-weight:900;min-width:62px;flex-shrink:0;font-size:11px;padding-top:1px;text-transform:uppercase;letter-spacing:.04em}
.tl-text{color:#E0E8FF;line-height:1.55}
.tts-note{font-size:11px;color:rgba(255,255,255,.35);padding:8px 16px 12px;text-align:center}

/* Kinesthetic */
.kine-scenario{border-radius:14px;padding:14px;margin-bottom:12px;border:2px solid}
.kine-scenario h4{font-size:14px;font-weight:800;margin-bottom:8px}
.kine-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kc-btn{border-radius:12px;padding:11px 12px;border:2px solid;cursor:pointer;font-size:12px;font-weight:700;text-align:left;transition:all .18s;line-height:1.4;background:#fff}
.kc-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 5px 14px rgba(0,0,0,.1)}
.kc-btn.picked-correct{background:#D5F5E3!important;border-color:#27AE60!important;color:#1B5E20!important}
.kc-btn.picked-wrong{background:#FDEDEC!important;border-color:#E74C3C!important;color:#7B241C!important;animation:shake .35s}
.kc-btn:disabled{cursor:default}
.kine-feedback{border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;margin-top:10px;display:none}
.kine-feedback.show{display:block}
.kine-progress{height:8px;background:#E0E0E0;border-radius:99px;overflow:hidden;margin-bottom:14px}
.kine-prog-fill{height:100%;border-radius:99px;transition:width .4s}

/* Read/Write */
.doc-wrap{border-radius:14px;overflow:hidden;border:2px solid}
.doc-header{padding:12px 16px;border-bottom:2px solid rgba(0,0,0,.08)}
.doc-body{padding:14px 16px;background:#fff}
.doc-section h4{font-size:13px;font-weight:900;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.doc-ul{padding-left:16px;margin-bottom:12px}
.doc-ul li{font-size:13px;line-height:1.7;color:#444}
.doc-callout{border-left:4px solid;padding:10px 14px;font-size:13px;font-style:italic;border-radius:0 10px 10px 0;line-height:1.6;margin:12px 0}
.doc-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.doc-table th{padding:7px 10px;text-align:left;font-weight:900;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.doc-table td{padding:7px 10px;border-top:1px solid rgba(0,0,0,.06)}
.doc-table tr:nth-child(even) td{background:rgba(0,0,0,.025)}

/* ── QUIZ SECTION ── */
.quiz-section{background:#fff;border-radius:20px;padding:18px;border:2.5px solid var(--yellow);margin-bottom:16px}
.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.quiz-badge{background:var(--yellow);color:#7A5500;font-size:11px;font-weight:900;padding:5px 14px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
.quiz-instruction{font-size:13px;color:var(--muted);font-weight:600}
.q-item{margin-bottom:18px}
.q-text{font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px;line-height:1.5}
.q-num{color:var(--blue);font-family:'Fredoka One',cursive;font-size:1rem;margin-right:4px}
.q-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.q-opt{border:2px solid #E8E8E8;border-radius:11px;padding:10px 12px;cursor:pointer;font-size:13px;font-weight:600;text-align:left;background:#FAFAFA;transition:all .15s;line-height:1.4}
.q-opt:hover:not(:disabled){border-color:#A0ADB8;background:#F0F4F8}
.q-opt.selected{border-color:var(--blue);background:#EBF5FF;color:#1A5276;font-weight:800}
.q-opt.ans-correct{border-color:#27AE60!important;background:#D5F5E3!important;color:#1B5E20!important}
.q-opt.ans-wrong{border-color:#E74C3C!important;background:#FDEDEC!important;color:#7B241C!important}
.q-opt.ans-reveal{border-color:#27AE60!important;background:rgba(39,174,96,.08)!important;color:#1B5E20!important;font-weight:800}
.q-opt:disabled{cursor:default}
.quiz-submit-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:8px}
.btn-submit-quiz{padding:12px 32px;font-family:'Fredoka One',cursive;font-size:1.1rem;border:none;border-radius:12px;cursor:pointer;transition:all .18s;background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(91,143,249,.4)}
.btn-submit-quiz:disabled{background:#C0C0C0;box-shadow:none;cursor:not-allowed}
.btn-submit-quiz:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 7px 20px rgba(91,143,249,.5)}
.quiz-result-msg{font-size:14px;font-weight:800;padding:10px 16px;border-radius:12px;text-align:center}
.qr-pass{background:#D5F5E3;color:#1B5E20;border:1.5px solid #A9DFBF}
.qr-fail{background:#FDEDEC;color:#7B241C;border:1.5px solid #F5B7B1}
.btn-retry-quiz{padding:10px 24px;font-weight:800;font-size:13px;border-radius:99px;border:2px solid #E74C3C;color:#E74C3C;background:none;cursor:pointer;transition:all .15s}
.btn-retry-quiz:hover{background:#FDEDEC}

/* Build button */
.build-bar{padding:0 18px 28px;text-align:center}
.btn-build{width:100%;max-width:380px;padding:17px;font-family:'Fredoka One',cursive;font-size:1.3rem;background:linear-gradient(135deg,#27AE60,#2ECC71);color:#fff;border:none;border-radius:18px;cursor:pointer;box-shadow:0 6px 22px rgba(39,174,96,.45);transition:all .2s}
.btn-build:hover{transform:translateY(-3px) scale(1.02)}
.btn-build:disabled{background:linear-gradient(135deg,#BDC3C7,#95A5A6);box-shadow:none;cursor:not-allowed;transform:none}
.build-hint{font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700}

/* ── BUILT ── */
#screen-built{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 50%,#FFF8EC 100%)}
@keyframes popIn{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.built-emoji{font-size:4.5rem;animation:popIn .5s cubic-bezier(.34,1.7,.64,1)}
.built-score-reveal{background:#fff;border-radius:18px;padding:14px 22px;margin:1rem 0;box-shadow:var(--shadow);display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.bsr-stat{text-align:center}.bsr-num{font-family:'Fredoka One',cursive;font-size:2rem;display:block}
.bsr-lbl{font-size:12px;color:var(--muted);font-weight:700}
.btn-continue{margin-top:1.2rem;padding:14px 44px;font-family:'Fredoka One',cursive;font-size:1.2rem;background:var(--blue);color:#fff;border:none;border-radius:99px;cursor:pointer;box-shadow:0 5px 18px rgba(91,143,249,.4);transition:all .18s}
.btn-continue:hover{transform:translateY(-2px)}

/* ── RESULTS ── */
#screen-results{min-height:100vh;background:linear-gradient(180deg,#F3EFFF 0%,#FFF8EC 40%)}
.results-hero{background:linear-gradient(135deg,#2C3E50,#4A6FA5);padding:30px 20px 26px;text-align:center;color:#fff;overflow:hidden;position:relative}
.results-hero::before{content:'🌟';font-size:7rem;position:absolute;opacity:.07;top:-5px;right:-5px;animation:spin 8s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.results-body{padding:18px}
.dominant-card{border-radius:22px;padding:22px 18px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
.dominant-card::before{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.1);top:-50px;right:-30px}
.dom-emoji{font-size:3.2rem;margin-bottom:6px}
.dom-title{font-size:1.75rem;color:#fff;margin-bottom:5px}
.dom-desc{font-size:14px;color:rgba(255,255,255,.9);line-height:1.6;max-width:380px;margin:0 auto}
.accuracy-banner{background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);display:flex;justify-content:space-around;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.acc-stat{text-align:center}.acc-num{font-family:'Fredoka One',cursive;font-size:1.8rem;display:block}.acc-lbl{font-size:12px;color:var(--muted);font-weight:700}
.breakdown-title{font-size:12px;font-weight:900;color:#636E72;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.rbc{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:9px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.rbc-icon{font-size:1.4rem;width:32px;text-align:center;flex-shrink:0}
.rbc-info{flex:1}.rbc-name{font-weight:800;font-size:13px;display:flex;align-items:center;gap:6px}
.rbc-track{height:9px;background:#F0F0F0;border-radius:99px;overflow:hidden;margin-top:5px}
.rbc-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.34,1.2,.64,1)}
.rbc-pct{font-size:13px;font-weight:800;min-width:34px;text-align:right;flex-shrink:0}
.tips-card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:18px}
.tip-pill{display:inline-block;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;margin:4px 4px 4px 0;line-height:1.4}

// ═══════════════════════════════════════════════════════
// AUDIO ENGINE — StreamElements TTS (free, no key, unlimited)
// ═══════════════════════════════════════════════════════
// Two distinct voices: Brian (British male) for HOST, Amy (British female) for GUEST
// API: https://api.streamelements.com/kappa/v2/speech?voice=X&text=Y
// Completely free, no account, no rate limit for normal usage.

const SE_VOICES = { HOST:'Brian', GUEST:'Amy' };
let audioCache  = {};     // "SPEAKER|||text" → blob URL (session cache)
let currentAudio = null;  // active HTMLAudioElement
let ttsQueue=[], ttsTimer=null, ttsLineIndex=-1, ttsTotalLines=0, ttsStartTime=0;

// ── Core helpers ──
function initAudio(lines){
  stopAudio();
  ttsQueue=lines; ttsTotalLines=lines.length; ttsLineIndex=-1;
  renderTranscript(lines);
}

function renderTranscript(lines){
  const el=document.getElementById('transcript-area');
  if(!el)return;
  el.innerHTML=lines.map((l,i)=>`<div class="transcript-line" id="tl-${i}">
    <span class="tl-speaker" style="color:${l.color}">${l.speaker}</span>
    <span class="tl-text">${l.text}</span>
  </div>`).join('');
}

function highlightLine(i){
  document.querySelectorAll('.transcript-line').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('tl-'+i);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest',behavior:'smooth'});}
  ttsLineIndex=i; updatePodProgress();
}

function updatePodProgress(){
  const pct=ttsTotalLines>0?(ttsLineIndex+1)/ttsTotalLines*100:0;
  const prog=document.getElementById('pod-prog'); if(prog)prog.style.width=pct+'%';
  const cur=document.getElementById('pod-time-cur');
  if(cur){const s=Math.round((Date.now()-ttsStartTime)/1000);cur.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
}

function setBtnState(state){
  const btn=document.getElementById('btn-play'); if(!btn)return;
  if(state==='loading'){btn.textContent='⟳';btn.style.opacity='.6';}
  else if(state==='pause'){btn.textContent='⏸';btn.style.opacity='1';}
  else{btn.textContent='▶';btn.style.opacity='1';}
}

// ── StreamElements fetch with session cache ──
async function fetchSE(text, speaker){
  const cacheKey=speaker+'|||'+text;
  if(audioCache[cacheKey])return audioCache[cacheKey];
  const voice=SE_VOICES[speaker]||'Brian';
  const url=`https://api.streamelements.com/kappa/v2/speech?voice=${voice}&text=${encodeURIComponent(text)}`;
  try{
    const res=await fetch(url);
    if(!res.ok)throw new Error('SE TTS HTTP '+res.status);
    const blob=await res.blob();
    const blobUrl=URL.createObjectURL(blob);
    audioCache[cacheKey]=blobUrl;
    return blobUrl;
  }catch(e){
    console.warn('StreamElements TTS failed:',e.message);
    return null;
  }
}

// ── Playback chain ──
async function speakLine(i){
  if(!S.audioPlaying||i>=ttsQueue.length){
    if(i>=ttsQueue.length){setBtnState('play');S.audioPlaying=false;}
    return;
  }
  highlightLine(i); setBtnState('loading');
  // Prefetch next line in background while this one loads
  if(i+1<ttsQueue.length) fetchSE(ttsQueue[i+1].text, ttsQueue[i+1].speaker);

  const url=await fetchSE(ttsQueue[i].text, ttsQueue[i].speaker);
  if(!S.audioPlaying)return;

  if(!url){
    // StreamElements failed — fall back to browser speech for this line
    setBtnState('pause');
    if(window.speechSynthesis){
      const u=new SpeechSynthesisUtterance(ttsQueue[i].text);
      u.rate=0.88; u.pitch=ttsQueue[i].speaker==='HOST'?0.95:1.1;
      u.onend=()=>{if(S.audioPlaying)speakLine(i+1);};
      speechSynthesis.speak(u);
    } else { speakLine(i+1); }
    return;
  }

  setBtnState('pause');
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const audio=new Audio(url); currentAudio=audio;
  audio.playbackRate=0.96; // slightly slower = more natural podcast feel
  audio.play().catch(()=>{});
  audio.onended=()=>{
    clearInterval(ttsTimer);
    if(S.audioPlaying) speakLine(i+1);
  };
  ttsTimer=setInterval(updatePodProgress, 800);
}

// ── Public controls ──
function toggleAudio(){
  if(!S.audioPlaying){
    S.audioPlaying=true;
    if(ttsStartTime===0) ttsStartTime=Date.now();
    const from=ttsLineIndex<0?0:ttsLineIndex;
    speakLine(from);
    const tot=document.getElementById('pod-time-tot');
    if(tot)tot.textContent='~'+Math.round(ttsQueue.length*5)+'s';
  } else {
    S.audioPlaying=false;
    if(currentAudio) currentAudio.pause();
    if(window.speechSynthesis) speechSynthesis.cancel();
    clearInterval(ttsTimer);
    setBtnState('play');
  }
}

function stopAudio(){
  S.audioPlaying=false;
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  if(window.speechSynthesis) speechSynthesis.cancel();
  clearInterval(ttsTimer); ttsLineIndex=-1; ttsStartTime=0;
  setBtnState('play');
  const prog=document.getElementById('pod-prog'); if(prog)prog.style.width='0%';
  document.querySelectorAll('.transcript-line').forEach(e=>e.classList.remove('active'));
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#FFD93D','#FF6B6B','#4ECDC4','#A29BFE','#6BCB77','#FF8A80','#5B8FF9','#FDCB6E'];
  const p=Array.from({length:100},()=>({x:Math.random()*canvas.width,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,r:Math.random()*7+3,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,rs:(Math.random()-.5)*10,shape:Math.random()>.5?'rect':'circle'}));
  let f=0;
  (function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);p.forEach(q=>{ctx.save();ctx.translate(q.x,q.y);ctx.rotate(q.rot*Math.PI/180);ctx.fillStyle=q.color;ctx.globalAlpha=Math.max(0,1-f/130);if(q.shape==='rect')ctx.fillRect(-q.r,-q.r/2,q.r*2,q.r);else{ctx.beginPath();ctx.arc(0,0,q.r,0,Math.PI*2);ctx.fill();}ctx.restore();q.x+=q.vx;q.y+=q.vy;q.rot+=q.rs;q.vy+=.06;});f++;if(f<150)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);})();
}

    html+=`<div class="kine-scenario" style="border-color:${answered?(wasCorrect?'#27AE60':'#E74C3C'):m.color};background:${answered?(wasCorrect?'#F0FFF4':'#FDEDEC'):'#fff'};${!isCurrent&&!answered?'opacity:.45;pointer-events:none':''}">
      <h4>📋 Scenario ${i+1} of ${scens.length}</h4>
      <p style="font-size:13px;line-height:1.6;margin-bottom:10px;color:#2D3436">${sc.q}</p>
      <div class="kine-choices">
        ${sc.opts.map((opt,oi)=>`<button class="kc-btn ${answered&&oi===sc.correct?'picked-correct':''} ${answered&&oi!==sc.correct&&S.kineChoices&&S.kineChoices[i]===oi?'picked-wrong':''}" style="border-color:${m.color};color:${m.text||m.dark}" onclick="kineChoose(${i},${oi})" ${answered?'disabled':''}>${opt}</button>`).join('')}
      </div>
      ${answered?`<div class="kine-feedback show" style="background:${wasCorrect?'#D5F5E3':'#FDEDEC'};color:${wasCorrect?'#1B5E20':'#7B241C'};border:1.5px solid ${wasCorrect?'#A9DFBF':'#F5B7B1'}">${wasCorrect?'✅':'❌'} ${sc.feedback}</div>`:''}
    </div>`;
  });

  return html;
}

// ═══════════════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════════════
function renderWelcome(){
  return `<div id="screen-welcome">
    <div class="welcome-sun"></div>
    <div class="wcloud wc1"></div><div class="wcloud wc2"></div>
    <svg width="100%" viewBox="0 0 700 110" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <rect x="30" y="55" width="68" height="55" fill="#5B8FF9" opacity=".45" rx="4"/><polygon points="25,55 63,28 101,55" fill="#3D6FDE" opacity=".45"/>
      <rect x="118" y="38" width="55" height="72" fill="#4ECDC4" opacity=".4" rx="3"/><rect x="114" y="30" width="63" height="13" rx="3" fill="#2A9D8F" opacity=".4"/>
      <rect x="190" y="48" width="75" height="62" fill="#FFD93D" opacity=".38" rx="3"/>
      <rect x="280" y="68" width="65" height="42" fill="#6BCB77" opacity=".38" rx="3"/>
      <rect x="360" y="32" width="80" height="78" fill="#FF8A80" opacity=".42" rx="3"/><ellipse cx="400" cy="32" rx="25" ry="17" fill="#FF5722" opacity=".38"/>
      <rect x="460" y="52" width="60" height="58" fill="#A29BFE" opacity=".38" rx="3"/>
      <rect y="105" width="700" height="8" fill="#7EC850" opacity=".55" rx="2"/>
    </svg>
    <div class="welcome-inner">
      <div class="game-badge">🏆 Adult Learning Styles Discovery</div>
      <h1 class="welcome-title">Build-a-City!</h1>
      <p class="welcome-sub">Complete 5 professional missions, engage with real evidence, and prove your understanding — then discover exactly how you learn.</p>
      <div class="feature-pills">
        <div class="feat">🏙️ 5 Expert Missions</div>
        <div class="feat">🧠 Knowledge Checks Required</div>
        <div class="feat">🔊 Real Audio Playback</div>
        <div class="feat">📊 VARK Profile + Accuracy Score</div>
      </div>
      <button class="btn-start" onclick="startGame()">🚀 Start Building!</button>
    </div>
  </div>`;
}

function renderCity(){
  const cards=MISSIONS.map(m=>{
    const done=S.completed.includes(m.id);
    return `<div class="m-card ${done?'done':'avail'}" onclick="${done?'':` openMission('${m.id}')`}">
      ${done?'<div class="m-check">✓</div>':''}
      <div class="m-icon">${m.icon}</div>
      <div class="m-name">${m.name}</div>
      <div class="m-status">${done?'✅ Built':'Tap to build'}</div>
    </div>`;
  }).join('');
  return `<div id="screen-city">
    <div class="city-header">
      <div>
        <div class="fredoka" style="font-size:1.25rem;color:#fff">🏙️ Learnville</div>
        <div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">${S.completed.length}/5 built · ${S.totalAnswers>0?Math.round(S.correctAnswers/S.totalAnswers*100):0}% overall accuracy</div>
      </div>
      <div class="score-chips">
        ${PATHS.map(p=>`<div class="schip">${p.icon}${S.styleScore[p.id]}</div>`).join('')}
      </div>
    </div>
    <div class="city-canvas-wrap">${citySvg()}</div>
    <div class="city-bottom">
      <h3 class="fredoka" style="margin-bottom:10px">🏗️ Choose your next mission</h3>
      <div class="mission-grid">${cards}</div>
      ${styleTrackerHtml()}
    </div>
  </div>`;
}

function renderModal(){
  if(!S.modalOpen||!S.currentMission)return'';
  const m=S.currentMission;
  return `<div class="overlay" id="mission-overlay" onclick="closeMissionBg(event)">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-hdr">
        <div class="modal-big-icon" style="background:${m.color}22;border:2px solid ${m.color}44">${m.icon}</div>
        <div><div class="modal-mission-title fredoka">${m.name}</div><div style="font-size:12px;color:${m.color};font-weight:800">${m.tag}</div></div>
      </div>
      <p class="modal-desc">${m.desc}</p>
      <div class="paths-label">⚡ Choose your learning approach</div>
      <div class="path-grid">
        ${PATHS.map(p=>`<button class="path-btn pb-${p.id}" onclick="choosePath('${m.id}','${p.id}')">
          <span class="pb-icon">${p.icon}</span>
          <span class="pb-name">${p.short}</span>
          <span class="pb-desc">${p.desc}</span>
        </button>`).join('')}
      </div>
      <button class="btn-close-modal" onclick="closeModal()">← Back to city</button>
    </div>
  </div>`;
}

function renderActivity(){
  const m=S.currentMission, p=S.currentPath;
  const c=CONTENT[m.id][p.id];
  const isKine=p.id==='K';
  const kineAllDone=isKine&&S.kineAnswers.length>=3;
  const canShowQuiz=!isKine||(isKine&&kineAllDone);
  const buildEnabled=S.quizPassed;

  let content='';
  if(isKine){
    content=`<div class="act-content" style="background:${p.bg};border-color:${p.border}">
      <div class="act-phase-label" style="color:${p.text}">🧪 Make real decisions — choose the best option for each scenario</div>
      ${kineScenariosHtml()}
    </div>`;
  } else if(p.id==='A'){
    // Render podcast content then inject EL key panel into the player
    content=c.render().replace('<div class="tts-note">🔊 Uses your browser\'s text-to-speech — enable audio for full experience</div>',elKeyPanelHtml(p.color));
  } else {
    content=c.render();
  }

  return `<div id="screen-activity">
    <div class="act-header">
      <button onclick="backToCity()" style="background:none;border:1.5px solid #E0E0E0;border-radius:99px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted)">← City</button>
      <div class="path-badge" style="background:${p.bg};color:${p.text||p.color};border:1.5px solid ${p.border}">${p.icon} ${p.name}</div>
      <div class="act-title fredoka">${m.icon} ${m.name}</div>
    </div>
    <div class="act-body">
      ${content}
      ${canShowQuiz?quizHtml():'<div style="font-size:13px;color:var(--muted);text-align:center;padding:10px 0;font-weight:700">Complete all three scenarios above to unlock the knowledge check ⬆</div>'}
    </div>
    <div class="build-bar">
      <div class="build-hint">${buildEnabled?'🎉 Knowledge check passed! Build your '+m.name:S.quizSubmitted&&!S.quizPassed?'❌ Review the material and retry the quiz':'📝 Complete the knowledge check above to unlock building'}</div>
      <button class="btn-build" ${buildEnabled?'':'disabled'} onclick="completeActivity()">🏗️ Build the ${m.name}!</button>
    </div>
  </div>`;
}

function renderBuilt(){
  const m=S.currentMission, p=S.currentPath;
  const qs=QUIZZES[m.id];
  const score=qs.filter((q,i)=>S.quizAnswers[i]===q.ans).length;
  const kineCorrect=S.kineAnswers.filter(Boolean).length;
  const isKine=p.id==='K';
  return `<div id="screen-built">
    <div class="built-emoji">${m.icon}</div>
    <h2 class="fredoka" style="font-size:2.3rem;color:#1A3D5C;margin:.4rem 0">${m.name} Built! 🎉</h2>
    <p style="font-size:1rem;color:#3D6E8C;font-weight:600;max-width:340px;margin:0 auto">Citizens of Learnville are thrilled with their new ${m.name}!</p>
    <div class="built-score-reveal">
      <div class="bsr-stat"><span class="bsr-num" style="color:${p.color}">${isKine?kineCorrect+'/3':score+'/3'}</span><span class="bsr-lbl">${isKine?'Decisions':'Quiz Score'}</span></div>
      <div class="bsr-stat"><span class="bsr-num" style="color:${S.totalAnswers>0?'#27AE60':'#95A5A6'}">${S.totalAnswers>0?Math.round(S.correctAnswers/S.totalAnswers*100)+'%':'—'}</span><span class="bsr-lbl">Overall Accuracy</span></div>
      <div class="bsr-stat"><span class="bsr-num" style="color:${p.color}">${p.icon}</span><span class="bsr-lbl">${p.short} Style</span></div>
    </div>
    <div style="margin-top:.6rem;padding:13px 18px;background:rgba(255,255,255,.8);border-radius:14px;max-width:360px;font-size:13px;color:var(--muted);line-height:1.6">
      <strong style="color:${p.color}">${p.name}:</strong> ${STYLE_DESC[p.id].slice(0,110)}...
    </div>
    ${S.completed.length>=5
      ?`<button class="btn-continue" style="background:linear-gradient(135deg,#8E44AD,#E74C3C)" onclick="showResults()">🌟 See Your Full Learning Profile!</button>`
      :`<button class="btn-continue" onclick="continueBuilding()">🏙️ Continue Building (${S.completed.length}/5)</button>`
    }
  </div>`;
}

function renderResults(){
  const scores=PATHS.map(p=>({...p,count:S.styleScore[p.id]}));
  const max=Math.max(...scores.map(s=>s.count),1);
  const dom=scores.reduce((a,b)=>b.count>a.count?b:a);
  const acc=S.totalAnswers>0?Math.round(S.correctAnswers/S.totalAnswers*100):0;
  return `<div id="screen-results">
    <div class="results-hero">
      <div style="font-size:11px;font-weight:900;letter-spacing:.08em;background:rgba(255,255,255,.18);display:inline-block;padding:5px 16px;border-radius:99px;margin-bottom:8px">🌟 CITY COMPLETE</div>
      <h2 class="fredoka">Your Learning Profile</h2>
      <p style="opacity:.85;font-size:.95rem;font-weight:600">Learnville is built — your style is revealed!</p>
    </div>
    <div class="results-body">
      <div class="dominant-card" style="background:linear-gradient(135deg,${dom.color},${dom.color}CC)">
        <div class="dom-emoji">${dom.icon}</div>
        <h3 class="dom-title fredoka">${dom.name}</h3>
        <p class="dom-desc">${STYLE_DESC[dom.id]}</p>
      </div>
      <div class="accuracy-banner">
        <div class="acc-stat"><span class="acc-num" style="color:${dom.color}">${dom.count}/5</span><span class="acc-lbl">${dom.short} Missions</span></div>
        <div class="acc-stat"><span class="acc-num" style="color:${acc>=80?'#27AE60':acc>=60?'#F39C12':'#E74C3C'}">${acc}%</span><span class="acc-lbl">Knowledge Accuracy</span></div>
        <div class="acc-stat"><span class="acc-num" style="color:#5B8FF9">${S.correctAnswers}/${S.totalAnswers}</span><span class="acc-lbl">Correct Answers</span></div>
      </div>
      <div class="breakdown-title">All Styles — Your Distribution</div>
      ${scores.map(s=>{const pct=Math.round(s.count/max*100);return`<div class="rbc"><div class="rbc-icon">${s.icon}</div><div class="rbc-info"><div class="rbc-name">${s.short}${s.id===dom.id?` <span style="background:${s.color};color:#fff;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:800">Primary</span>`:''}</div><div class="rbc-track"><div class="rbc-fill" style="width:${pct}%;background:${s.color}"></div></div></div><div class="rbc-pct" style="color:${s.color}">${s.count}/5</div></div>`}).join('')}
      <div class="tips-card">
        <h4 class="fredoka" style="font-size:1.05rem;margin-bottom:10px">💡 Tips for <span style="color:${dom.color}">${dom.short} Learners</span></h4>
        ${STYLE_TIPS[dom.id].map(t=>`<div class="tip-pill" style="background:${dom.bg||'#F0F0F0'};color:${dom.text||dom.color}">✓ ${t}</div>`).join('')}
      </div>
      <div style="background:#fff;border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:16px;font-size:13px;color:var(--muted);line-height:1.7">
        <strong style="color:var(--text)">📊 What your accuracy score means:</strong><br>
        ${acc>=80?'Exceptional. You engaged deeply with the evidence across all 5 missions.':acc>=60?'Good engagement. Some topics challenged you — those are worth revisiting.':'The content was demanding! Review the evidence briefs for the missions you found hardest.'}
      </div>
      <button class="btn-restart" onclick="restartGame()">🔄 Play Again — Try Different Paths</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════
function startGame(){S.screen='city';render()}

function openMission(id){
  if(S.completed.includes(id))return;
  S.currentMission=MISSIONS.find(m=>m.id===id);
  S.modalOpen=true;
  render();
}

function closeModal(){S.modalOpen=false;render()}
function closeMissionBg(e){if(e.target.id==='mission-overlay')closeModal()}

function choosePath(mId,pId){
  S.currentMission=MISSIONS.find(m=>m.id===mId);
  S.currentPath=PATHS.find(p=>p.id===pId);
  S.kineScenario=0; S.kineAnswers=[]; S.kineChoices={};
  S.quizAnswers=[null,null,null]; S.quizSubmitted=false; S.quizPassed=false; S.quizRetryUsed=false;
  S.modalOpen=false; S.screen='activity';
  ttsLineIndex=-1; ttsStartTime=0; S.audioPlaying=false;
  render();
  // init audio if auditory path
  if(pId==='A'){
    const audio=CONTENT[mId][pId].audio;
    if(audio){
      setTimeout(()=>{
        initAudio(audio);
      },200);
    }
  }
}

function kineChoose(scenIdx, optIdx){
  if(scenIdx!==S.kineAnswers.length)return; // must do in order
  if(!S.kineChoices)S.kineChoices={};
  S.kineChoices[scenIdx]=optIdx;
  const sc=CONTENT[S.currentMission.id].K.scenarios[scenIdx];
  const correct=optIdx===sc.correct;
  S.kineAnswers.push(correct);
  // count toward overall accuracy
  S.totalAnswers++;
  if(correct)S.correctAnswers++;
  render();
}

function selectQ(qi, oi){
  if(S.quizSubmitted)return;
  S.quizAnswers[qi]=oi;
  render();
}

function submitQuiz(){
  if(S.quizAnswers.includes(null))return;
  S.quizSubmitted=true;
  const qs=QUIZZES[S.currentMission.id];
  const score=qs.filter((q,i)=>S.quizAnswers[i]===q.ans).length;
  S.quizPassed=score>=2;
  // track accuracy
  S.totalAnswers+=3;
  S.correctAnswers+=score;
  render();
}

function retryQuiz(){
  if(S.quizRetryUsed)return;
  S.quizRetryUsed=true;
  S.quizSubmitted=false;
  S.quizAnswers=[null,null,null];
  render();
}

function completeActivity(){
  if(!S.quizPassed)return;
  stopAudio();
  const m=S.currentMission, p=S.currentPath;
  if(!S.completed.includes(m.id)){
    S.completed.push(m.id);
    S.styleScore[p.id]=(S.styleScore[p.id]||0)+1;
  }
  S.screen='built';
  render();
  launchConfetti();
}

function backToCity(){stopAudio();S.screen='city';render()}
function continueBuilding(){S.screen='city';render()}
function showResults(){S.screen='results';render();setTimeout(()=>window.scrollTo(0,0),50)}
function restartGame(){
  stopAudio();
  S={screen:'city',completed:[],styleScore:{V:0,A:0,R:0,K:0},totalScore:0,correctAnswers:0,totalAnswers:0,currentMission:null,currentPath:null,modalOpen:false,kineScenario:0,kineAnswers:[],quizAnswers:[null,null,null],quizSubmitted:false,quizPassed:false,quizRetryUsed:false,audioLines:[],audioIndex:-1,audioPlaying:false};
  render();
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const old=document.getElementById('mission-overlay');
  if(old)old.remove();
  const app=document.getElementById('app');
  if(S.screen==='welcome')app.innerHTML=renderWelcome();
  else if(S.screen==='city')app.innerHTML=renderCity();
  else if(S.screen==='activity')app.innerHTML=renderActivity();
  else if(S.screen==='built')app.innerHTML=renderBuilt();
  else if(S.screen==='results')app.innerHTML=renderResults();
  if(S.modalOpen&&S.currentMission&&S.screen==='city'){
    const d=document.createElement('div');
    d.innerHTML=renderModal();
    document.body.appendChild(d.firstChild);
  }
  if(S.screen==='city'){
    S.completed.forEach(id=>{const el=document.getElementById('built-'+id);if(el)el.classList.add('build-enter');});
  }
}

render();
</script>
